# Marrow v2 default configuration.
# CLI flags > env vars (MARROW_*) > this file > built-in defaults.

ingest:
  parser: docling
  parser_mode: auto

distill:
  compression_ratio: 0.30
  max_continuation_rounds: 5

coherence:
  max_fix_rounds: 2
  similarity_threshold: 0.75

export:
  vault: null

cost:
  max_per_book: 3.00

models:
  # Flash with thinking for spine extraction — needs reasoning to decide
  # what's load-bearing vs filler.
  spine:
    provider: gemini
    model_id: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
    thinking: true
    thinking_budget: 8192

  # Pro for distillation — needs high-quality prose generation.
  distill:
    provider: gemini
    model_id: gemini-2.5-pro
    api_key_env: GEMINI_API_KEY

  # Sonnet for coherence audit — whole-book reasoning, one call.
  coherence:
    provider: anthropic
    model_id: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY

logging:
  level: INFO
