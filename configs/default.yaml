# Marrow v0.2 default configuration.
# CLI flags > env vars (MARROW_*) > this file > built-in defaults.
# All stages use Gemini 3 Flash. Only GEMINI_API_KEY is required.

ingest:
  parser: docling
  parser_mode: auto

distill:
  compression_ratio: 0.30
  max_continuation_rounds: 5
  max_output_tokens: 16384

coherence:
  max_fix_rounds: 2
  similarity_threshold: 0.75

export:
  vault: null

cost:
  max_per_book: 3.00

models:
  spine:
    provider: gemini
    model_id: gemini-3-flash-preview
    api_key_env: GEMINI_API_KEY

  distill:
    provider: gemini
    model_id: gemini-3-flash-preview
    api_key_env: GEMINI_API_KEY

  coherence:
    provider: gemini
    model_id: gemini-3-flash-preview
    api_key_env: GEMINI_API_KEY

logging:
  level: INFO
