# Marrow v0.2 default configuration.
# CLI flags > env vars (MARROW_*) > this file > built-in defaults.
# Default: codex for heavy stages, gemini for classify.

ingest:
  parser: docling
  parser_mode: auto

distill:
  compression_ratio: 0.30
  max_continuation_rounds: 5
  max_output_tokens: 16384

coherence:
  max_fix_rounds: 2
  similarity_threshold: 0.75

export:
  vault: null

cost:
  max_per_book: 3.00

models:
  # Classify stays on Gemini Flash Lite: one call per book, ~$0.001, and
  # routing it through codex would add 60s overhead for no meaningful saving.
  classify:
    provider: gemini
    model_id: gemini-flash-lite-latest
    api_key_env: GEMINI_API_KEY

  # Spine, distill, and coherence go through Codex CLI (subscription-billed,
  # zero marginal cost). Slower but free if you already pay for ChatGPT.
  spine:
    provider: codex
    model_id: gpt-5.1-codex

  distill:
    provider: codex
    model_id: gpt-5.1-codex

  coherence:
    provider: codex
    model_id: gpt-5.1-codex

logging:
  level: INFO
