# Explicit local API-mode preset: Ollama everywhere.
# Requires a local Ollama server, e.g. `ollama serve`, with `qwen3:14b` pulled.
extends: default.yaml

mode: api

models:
  claim_extraction:
    provider: ollama
    model_id: qwen3:14b
    api_base: http://localhost:11434
  graph_extraction:
    provider: ollama
    model_id: qwen3:14b
    api_base: http://localhost:11434
  synthesis:
    provider: ollama
    model_id: qwen3:14b
    api_base: http://localhost:11434
  validation:
    provider: ollama
    model_id: qwen3:14b
    api_base: http://localhost:11434
  quiz_generation:
    provider: ollama
    model_id: qwen3:14b
    api_base: http://localhost:11434
