# Express Mode: skip adversarial validation (Stage 05b) and evaluation (Stage 06a)
# for ~50% faster runtime. Trades mathematical completeness for speed; citation
# traceability and hierarchical structure are fully preserved (Stages 01-05 and
# 06b run unchanged). Extends default.yaml, so host mode and host-agent routing
# are inherited.
extends: default.yaml

validate:
  max_iterations: 0

evaluate:
  skip: true
