# Anthropic-preferred preset: Sonnet 4.6 for synthesis + validation (best brief quality),
# local ollama for per-chunk work (claim + graph extraction run hundreds of times).
# Requires: ANTHROPIC_API_KEY env var.
extends: ollama.yaml

models:
  synthesis:
    provider: anthropic
    model_id: claude-sonnet-4-6
  validation:
    provider: anthropic
    model_id: claude-sonnet-4-6
  quiz_generation:
    provider: anthropic
    model_id: claude-sonnet-4-6
